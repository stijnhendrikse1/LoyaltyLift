  async _loadSectionConfig(sectionId, projectId, skipVisibilityFilter) {
    let config = null;

    // Check if the project uses a custom template
    if (projectId) {
      const project = this.currentProject || await window.llClient.getProject(projectId);
      if (project?.template_id) {
        try {
          const tmpl = await window.llClient.getTemplate(project.template_id);
          const tmplSections = tmpl.template_data?.sections || {};
          if (tmplSections[sectionId]) {
            config = JSON.parse(JSON.stringify(tmplSections[sectionId]));
          }
        } catch (err) {
          console.error('Failed to load custom template, falling back to default:', err);
        }
      }
    }

    if (!config) {
      // Ensure templates are loaded
      if (window._loadTemplates) await window._loadTemplates();
      if (window.llSectionTemplates && window.llSectionTemplates[sectionId]) {
        // Deep clone so we don't mutate the original template
        config = JSON.parse(JSON.stringify(window.llSectionTemplates[sectionId]));
        // Merge overrides from database
        try {
          const overrides = await window.llClient.getSurveyOverrides();
          const sectionOverrides = overrides.filter(o => o.section_id === sectionId);
          sectionOverrides.forEach(o => {
            const q = config.questions.find(q => q.key === o.question_key);
            if (q) {
              if (o.is_required !== null) q.required = o.is_required;
              if (o.default_value !== null) q.placeholder = String(o.default_value);
            }
          });
        } catch (err) {
          console.error('Failed to load survey overrides:', err);
        }
      } else {
        // Fallback: try to load dynamically
        try {
          const script = document.createElement('script');
          script.src = `/loyaltylift/templates/${sectionId}.js`;
          await new Promise((resolve, reject) => {
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
          config = window.llSectionTemplates?.[sectionId] ? JSON.parse(JSON.stringify(window.llSectionTemplates[sectionId])) : null;
        } catch (err) {
          console.error('Failed to load section template:', sectionId, err);
          return null;
        }
      }
    }

    if (!config) return null;

    // Apply project-level visibility overrides (use cache first, don't block)
    if (projectId && !skipVisibilityFilter) {
      try {
        const cachedVis = window.llClient._cache['visibility_' + projectId];
        const visOverrides = cachedVis ? cachedVis.data : await window.llClient.getVisibilityOverrides(projectId);
        // Check if entire section is hidden
        const sectionHidden = visOverrides.some(v => v.section_id === sectionId && !v.question_key && v.hidden);
        if (sectionHidden) return null;
        // Filter out hidden questions
        const hiddenQuestions = visOverrides.filter(v => v.section_id === sectionId && v.question_key && v.hidden);
        if (hiddenQuestions.length > 0) {
          config.questions = config.questions.filter(q => !hiddenQuestions.some(h => h.question_key === q.key));
        }
      } catch (err) {
        console.error('Failed to apply visibility overrides:', err);
      }
    }

    return config;
  }

  async _exportProject(projectId) {
    try {
      llToast.info('Generating export...');
      const XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');

      // Load project data
      const project = this.currentProject && this.currentProject.id === projectId
        ? this.currentProject
        : await window.llClient.getProject(projectId);

      // Load templates
      if (window._loadTemplates) await window._loadTemplates();

      // Get section names
      let sectionNames = this._getSectionNames();
      if (project.template_id) {
        try {
          const tmpl = await window.llClient.getTemplate(project.template_id);
          if (tmpl?.template_data?.sections) {
            Object.entries(tmpl.template_data.sections).forEach(([sid, s]) => { sectionNames[sid] = s.name || sid; });
          }
        } catch (e) { /* use defaults */ }
      }

      const wb = XLSX.utils.book_new();

      // Build Summary sheet
      const phaseLabels = { discovery: 'Discovery', design: 'Solution Design', launch: 'Launch Readiness' };
      const statusLabels = { not_started: 'Not Started', in_progress: 'In Progress', in_review: 'In Review', approved: 'Approved', skipped: 'Skipped' };
      const summaryData = [
        ['Project Name', project.program_name || ''],
        ['Client Organization', project.client_org?.name || ''],
        ['Industry', project.client_org?.industry || ''],
        ['Phase', phaseLabels[project.phase] || project.phase],
        ['Progress', (project.progress?.pct || 0) + '%'],
        [],
        ['Section', 'Phase', 'Status'],
      ];
      (project.sections || []).filter(s => s.visible).forEach(s => {
        summaryData.push([sectionNames[s.section_id] || s.section_id, phaseLabels[s.phase] || s.phase, statusLabels[s.status] || s.status]);
      });
      const summaryWs = XLSX.utils.aoa_to_sheet(summaryData);
      summaryWs['!cols'] = [{ wch: 35 }, { wch: 20 }, { wch: 15 }];
      XLSX.utils.book_append_sheet(wb, summaryWs, 'Summary');

      // Build one sheet per section with responses
      const visibleSections = (project.sections || []).filter(s => s.visible && s.status !== 'not_started');
      for (const s of visibleSections) {
        try {
          const sectionConfig = await this._loadSectionConfig(s.section_id, projectId);
          const data = await window.llClient.getSectionResponses(projectId, s.section_id);
          if (!sectionConfig || !data) continue;

          const rows = [['Question', 'Answer', 'Help Text', 'Required', 'Last Updated']];
          const questions = sectionConfig.questions || [];
          questions.forEach(q => {
            const resp = (data.responses || []).find(r => r.question_key === q.key);
            let answer = '';
            if (resp) {
              try { answer = typeof resp.value === 'string' ? JSON.parse(resp.value) : resp.value; } catch (e) { answer = resp.value; }
              if (Array.isArray(answer)) answer = answer.join(', ');
              if (typeof answer === 'object' && answer !== null) answer = JSON.stringify(answer);
            }
            rows.push([
              q.label || q.key,
              answer != null ? String(answer) : '',
              q.help || '',
              q.required ? 'Yes' : 'No',
              resp?.updated_at ? new Date(resp.updated_at).toLocaleString() : '',
            ]);
          });

          const ws = XLSX.utils.aoa_to_sheet(rows);
          ws['!cols'] = [{ wch: 40 }, { wch: 50 }, { wch: 30 }, { wch: 10 }, { wch: 20 }];
          const sheetName = (sectionNames[s.section_id] || s.section_id).substring(0, 31);
          XLSX.utils.book_append_sheet(wb, ws, sheetName);
        } catch (e) {
          console.error('Export section error:', s.section_id, e);
        }
      }

      const filename = (project.program_name || 'project').replace(/[^a-zA-Z0-9_-]/g, '_') + '_survey_export.xlsx';
      XLSX.writeFile(wb, filename);
      llToast.success('Export downloaded.');
    } catch (err) {
      console.error('Export error:', err);
      llToast.error('Failed to generate export: ' + err.message);
    }
  }

    const role = document.getElementById('ll-mm-role').value;
    if (!userId) { llToast.warning('Select a user to add.'); return; }
    const btn = document.getElementById('ll-mm-add-btn');
    btn.disabled = true;
    try {
      const { error } = await window.llClient.supabase.from('project_members').insert({ project_id: projectId, user_id: userId, role });
      if (error) throw error;
      window.llClient._invalidate('project');
      window.llClient._invalidate('projects');
      llToast.success('Member added.');
      document.querySelector('.ll-confirm-overlay')?.remove();
      this._showManageMembers(projectId);
    } catch (err) {
      console.error('Add member error:', err);
      llToast.error('Failed to add member. ' + err.message);
    } finally { btn.disabled = false; }
  }

  async _changeMemberRole(projectId, userId, newRole) {
    try {
      const { error } = await window.llClient.supabase
        .from('project_members')
        .update({ role: newRole })
        .eq('project_id', projectId)
        .eq('user_id', userId);
      if (error) throw error;
      window.llClient._invalidate('project');
      llToast.success('Role updated.');
    } catch (err) {
      console.error('Change role error:', err);
      llToast.error('Failed to change role. ' + (err.message || ''));
      // Refresh modal to reset dropdown
      document.querySelector('.ll-confirm-overlay')?.remove();
      this._showManageMembers(projectId);
    }
  }

  async _removeMember(projectId, userId) {
    if (!await llConfirm('Remove this member from the project?')) return;
    try {
      await window.llClient.supabase.from('project_members').delete().eq('project_id', projectId).eq('user_id', userId);
      window.llClient._invalidate('project');
      llToast.success('Member removed.');
      document.querySelector('.ll-confirm-overlay')?.remove();
      this._showManageMembers(projectId);
    } catch (err) {
      console.error('Remove member error:', err);
      llToast.error('Failed to remove member.');
    }
  }

      btn.classList.toggle('active', btn.textContent.trim().toLowerCase().replace('survey ', '') === tab);
    });
    const navItems = document.querySelectorAll('#ll-admin-nav .ll-nav-item');
    navItems.forEach(btn => btn.classList.remove('active'));
    const tabMap = { users: 0, projects: 1, templates: 2, template_editor: 3, feedback: 4, ai_prompts: 5 };
    navItems[tabMap[tab]]?.classList.add('active');

    const content = document.getElementById('ll-admin-content');

  _toggleAdminSection(sectionId) {
    const body = document.getElementById('ll-tmpl-body-' + sectionId);
    const arrow = document.getElementById('ll-tmpl-arrow-' + sectionId);
    if (body) {
      body.classList.toggle('open');
      if (arrow) arrow.style.transform = body.classList.contains('open') ? 'rotate(90deg)' : '';
    }
  }

  _adminTemplateChange(el) {
    const sid = el.dataset.section;
    const qkey = el.dataset.qkey;
    const field = el.dataset.field;
    const oKey = sid + '::' + qkey;

    if (!this._adminOverrides[oKey]) {
      // Initialize from template
      const tmpl = window.llSectionTemplates[sid];
      const q = tmpl?.questions?.find(qq => qq.key === qkey);
      this._adminOverrides[oKey] = {
        section_id: sid,
        question_key: qkey,
        is_required: q?.required || false,
        default_value: null,
      };
    }

    if (field === 'required') {
      this._adminOverrides[oKey].is_required = el.checked;
    } else if (field === 'default') {
      this._adminOverrides[oKey].default_value = el.value || null;
    }
  }

  async _adminSaveSection(sectionId) {
    const tmpl = window.llSectionTemplates[sectionId];
    if (!tmpl) return;

    const overrides = [];
    (tmpl.questions || []).forEach(q => {
      const oKey = sectionId + '::' + q.key;
      const o = this._adminOverrides[oKey];
      if (o) {
        overrides.push({
          question_key: q.key,
          is_required: o.is_required,
          default_value: o.default_value,
        });
      }
    });

    if (overrides.length === 0) {
      llToast.info('No changes to save.');
      return;
    }

    try {
      await window.llClient.saveSurveyOverrides(sectionId, overrides);
      llToast.success('Survey template overrides saved for this section.');
    } catch (err) {
      console.error('Save overrides error:', err);
      llToast.error('Failed to save overrides: ' + err.message);
    }
  }

  async _renderTemplateDetail(content) {
    if (!this._tplData) {
      const template = await window.llClient.getTemplate(this._tplEditing);
      this._tplData = template;
      this._tplWorkingData = JSON.parse(JSON.stringify(template.template_data || { sections: {} }));
      this._tplName = template.name;
      this._tplDesc = template.description || '';
    }

    const sections = this._tplWorkingData.sections || {};
    const sectionIds = Object.keys(sections);

    // Get phases (custom or default)
    if (!this._tplWorkingData.phases) {
      this._tplWorkingData.phases = [
        { id: 'discovery', name: 'Discovery' },
        { id: 'design', name: 'Solution Design' },
        { id: 'launch', name: 'Launch Readiness' },
      ];
    }
    const phases = this._tplWorkingData.phases;
    const phaseLabels = {};
    phases.forEach(p => { phaseLabels[p.id] = p.name; });

    // Group sections by phase
    const phaseGroups = {};
    phases.forEach(p => { phaseGroups[p.id] = []; });
    sectionIds.forEach(sid => {
      const s = sections[sid];
      const phase = s.phase || phases[0]?.id || 'discovery';
      if (!phaseGroups[phase]) phaseGroups[phase] = [];
      phaseGroups[phase].push(sid);
    });

    content.innerHTML = `
      <div class="ll-flex ll-justify-between ll-items-center" style="margin-bottom:1rem;">
        <div class="ll-flex ll-gap-3 ll-items-center">

      </div>

          <div>
            <label class="ll-label">Template Name</label>
            <input type="text" class="ll-input" id="ll-tpl-name" value="${this._esc(this._tplName)}" />
          </div>
          <div>
            <label class="ll-label">Description</label>
            <input type="text" class="ll-input" id="ll-tpl-desc" value="${this._esc(this._tplDesc)}" />
          </div>
        </div>
      </div>

      <div class="ll-tpl-editor">
        <div class="ll-tpl-sidebar">
          <div style="margin-bottom:0.5rem; font-size:0.6875rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--ll-on-surface-variant);">Phases (${phases.length})</div>
          <div style="margin-bottom:0.75rem;">
            ${phases.map((p, i) => `
              <div class="ll-flex ll-items-center ll-gap-1" style="margin-bottom:0.25rem;">
                <input class="ll-input" style="flex:1; font-size:0.6875rem; padding:0.25rem 0.5rem;" value="${this._esc(p.name)}" onblur="llApp._tplRenamePhase(${i}, this.value)" />
                <button class="ll-btn ll-btn-secondary ll-btn-sm" style="font-size:0.5625rem; padding:0.125rem 0.375rem; color:var(--ll-on-surface-variant);" onclick="llApp._tplMovePhase(${i}, -1)" ${i === 0 ? 'disabled' : ''}>&#9650;</button>
                <button class="ll-btn ll-btn-secondary ll-btn-sm" style="font-size:0.5625rem; padding:0.125rem 0.375rem; color:var(--ll-on-surface-variant);" onclick="llApp._tplMovePhase(${i}, 1)" ${i === phases.length - 1 ? 'disabled' : ''}>&#9660;</button>
                ${phases.length > 1 ? `<button class="ll-btn ll-btn-secondary ll-btn-sm" style="font-size:0.5625rem; padding:0.125rem 0.375rem; color:var(--ll-error);" onclick="llApp._tplDeletePhase(${i})">&#10005;</button>` : ''}
              </div>
            `).join('')}
            <button class="ll-btn ll-btn-secondary ll-btn-sm" style="width:100%; font-size:0.6875rem; justify-content:center; margin-top:0.25rem;" onclick="llApp._tplAddPhase()">+ Add Phase</button>
          </div>
          <div style="margin-bottom:0.75rem; font-size:0.6875rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--ll-on-surface-variant);">Sections (${sectionIds.length})</div>
          ${phases.map(phase => {
            const ids = phaseGroups[phase.id] || [];
            if (ids.length === 0 && !this._customizeMode) return `
              <div class="ll-tpl-phase-group">
                <div class="ll-tpl-phase-label">${this._esc(phase.name)}</div>
                <div class="ll-text-xs ll-text-muted" style="padding:0.25rem 0.5rem;">No sections</div>
              </div>
            `;
            return `
              <div class="ll-tpl-phase-group">
                <div class="ll-tpl-phase-label">${this._esc(phase.name)}</div>
                ${ids.map(sid => `
                  <button class="ll-tpl-sidebar-item ${this._tplActiveSection === sid ? 'active' : ''}" onclick="llApp._tplSelectSection('${sid}')">
                    ${this._esc(sections[sid].name || sid)}
                  </button>
                `).join('')}
              </div>
            `;
          }).join('')}
          <button class="ll-btn ll-btn-secondary ll-btn-sm" style="width:100%; margin-top:0.75rem; justify-content:center;" onclick="llApp._tplAddSection()">+ Add Section</button>
        </div>

        <div class="ll-tpl-main" id="ll-tpl-section-editor">
          ${this._tplActiveSection ? this._renderTplSectionEditor() : '<div class="ll-card" style="text-align:center; padding:3rem;"><p class="ll-text-sm ll-text-muted">Select a section from the sidebar to edit its questions.</p></div>'}
        </div>
      </div>
    `;
  }

  _renderTplSectionEditor() {
    const sid = this._tplActiveSection;
    const section = this._tplWorkingData.sections[sid];
    if (!section) return '<div class="ll-card"><p class="ll-text-sm ll-text-muted">Section not found.</p></div>';

    const questions = section.questions || [];
    const inputTypes = ['text', 'textarea', 'number', 'boolean', 'select', 'multi_select', 'date', 'file', 'currency', 'grid'];

    return `
      <div class="ll-card" style="padding:1.5rem; margin-bottom:1rem;">
        <div class="ll-grid-2" style="margin-bottom:1rem;">
          <div>
            <label class="ll-label">Section Name</label>
            <input type="text" class="ll-input" value="${this._esc(section.name || '')}" onblur="llApp._tplUpdateSection('name', this.value)" />
          </div>
          <div>
            <label class="ll-label">Phase</label>
            <select class="ll-select" onchange="llApp._tplUpdateSection('phase', this.value)">
              ${(this._tplWorkingData.phases || [{id:'discovery',name:'Discovery'},{id:'design',name:'Solution Design'},{id:'launch',name:'Launch Readiness'}]).map(p =>
                `<option value="${p.id}" ${section.phase === p.id ? 'selected' : ''}>${this._esc(p.name)}</option>`
              ).join('')}
            </select>
          </div>
        </div>
        <div>
          <label class="ll-label">Description</label>
          <input type="text" class="ll-input" value="${this._esc(section.description || '')}" onblur="llApp._tplUpdateSection('description', this.value)" />
        </div>
      </div>

      <div style="margin-bottom:0.75rem;">
        <span class="ll-label" style="display:inline;">Questions (${questions.length})</span>
      </div>

      ${questions.map((q, i) => `
        <div class="ll-tpl-q-card" id="ll-tpl-q-${i}">
          <div class="ll-flex ll-gap-2 ll-items-center" style="margin-bottom:0.75rem;">
            <button class="ll-tpl-reorder-btn" title="Move up" ${i === 0 ? 'disabled' : ''} onclick="llApp._tplMoveQuestion(${i}, -1)">&#9650;</button>
            <button class="ll-tpl-reorder-btn" title="Move down" ${i === questions.length - 1 ? 'disabled' : ''} onclick="llApp._tplMoveQuestion(${i}, 1)">&#9660;</button>
            <span class="ll-text-xs ll-text-muted" style="flex:1;">Q${i + 1}: ${this._esc(q.key)}</span>
            <button class="ll-tpl-delete-btn" onclick="llApp._tplDeleteQuestion(${i})">Delete</button>
          </div>

          <div class="ll-tpl-q-row">
            <div class="ll-tpl-q-label-field">
              <label class="ll-label">Label</label>
              <input type="text" class="ll-input" value="${this._esc(q.label || '')}" onblur="llApp._tplUpdateQuestion(${i}, 'label', this.value)" />
            </div>
            <div>
              <label class="ll-label">Input Type</label>
              <select class="ll-select" onchange="llApp._tplUpdateQuestion(${i}, 'inputType', this.value)">
                ${inputTypes.map(t => `<option value="${t}" ${q.inputType === t ? 'selected' : ''}>${t}</option>`).join('')}
              </select>
            </div>
          </div>

          <div class="ll-flex ll-gap-4 ll-items-center" style="margin-top:0.5rem; margin-bottom:0.5rem;">
            <label class="ll-flex ll-items-center ll-gap-2" style="font-size:0.8125rem; cursor:pointer;">
              <input type="checkbox" ${q.required ? 'checked' : ''} onchange="llApp._tplUpdateQuestion(${i}, 'required', this.checked)" />
              Required
            </label>
            <label class="ll-flex ll-items-center ll-gap-2" style="font-size:0.8125rem; cursor:pointer;">
              <input type="checkbox" ${q.pii ? 'checked' : ''} onchange="llApp._tplUpdateQuestion(${i}, 'pii', this.checked)" />
              PII
            </label>
          </div>

          <div class="ll-tpl-collapsible">
            <button class="ll-tpl-collapsible-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.textContent = this.nextElementSibling.classList.contains('open') ? '- Help Text' : '+ Help Text'">+ Help Text</button>
            <div class="ll-tpl-collapsible-content ${q.helpText ? 'open' : ''}">
              <input type="text" class="ll-input" value="${this._esc(q.helpText || '')}" placeholder="Help text for this question" onblur="llApp._tplUpdateQuestion(${i}, 'helpText', this.value)" />
            </div>
          </div>

          <div class="ll-tpl-collapsible">
            <button class="ll-tpl-collapsible-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.textContent = this.nextElementSibling.classList.contains('open') ? '- Placeholder' : '+ Placeholder'">+ Placeholder</button>
            <div class="ll-tpl-collapsible-content ${q.placeholder ? 'open' : ''}">
              <input type="text" class="ll-input" value="${this._esc(q.placeholder || '')}" placeholder="Placeholder text" onblur="llApp._tplUpdateQuestion(${i}, 'placeholder', this.value)" />
            </div>
          </div>

          ${(q.inputType === 'select' || q.inputType === 'multi_select') ? this._renderTplOptionsEditor(i, q.options || []) : ''}
        </div>
      `).join('')}

      <button class="ll-btn ll-btn-secondary" style="width:100%; justify-content:center; margin-top:0.5rem;" onclick="llApp._tplAddQuestion()">+ Add Question</button>

      <div style="margin-top:1.5rem; text-align:right;">
        <button class="ll-btn ll-btn-secondary" style="color:var(--ll-error);" onclick="llApp._tplDeleteSection()">Delete Section</button>
      </div>
    `;
  }

  _renderTplOptionsEditor(qIndex, options) {
    return `
      <div class="ll-tpl-options-editor">
        <label class="ll-label">Options</label>
        ${options.map((opt, oi) => `
          <div class="ll-tpl-option-row">
            <input type="text" class="ll-input" value="${this._esc(opt.label || '')}" placeholder="Label" onblur="llApp._tplUpdateOption(${qIndex}, ${oi}, 'label', this.value)" style="flex:1;" />
            <input type="text" class="ll-input" value="${this._esc(opt.value || '')}" placeholder="Value" onblur="llApp._tplUpdateOption(${qIndex}, ${oi}, 'value', this.value)" style="flex:1;" />
            <button class="ll-tpl-delete-btn" onclick="llApp._tplRemoveOption(${qIndex}, ${oi})">x</button>
          </div>
        `).join('')}
        <button class="ll-btn ll-btn-secondary ll-btn-sm" style="margin-top:0.375rem;" onclick="llApp._tplAddOption(${qIndex})">+ Add Option</button>
      </div>
    `;
  }

  _tplBackToList() {
    this._tplEditing = null;
    this._tplData = null;
    this._tplWorkingData = null;
    this._tplActiveSection = null;
    this._renderAdminTab();
  }

  _tplSelectSection(sid) {
    this._tplActiveSection = sid;
    const editor = document.getElementById('ll-tpl-section-editor');
    if (editor) editor.innerHTML = this._renderTplSectionEditor();
    // Update sidebar active state
    document.querySelectorAll('.ll-tpl-sidebar-item').forEach(el => el.classList.remove('active'));
    const items = document.querySelectorAll('.ll-tpl-sidebar-item');
    items.forEach(el => {
      if (el.textContent.trim() === (this._tplWorkingData.sections[sid]?.name || sid).trim()) el.classList.add('active');
    });
  }

  _tplUpdateSection(field, value) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    this._tplWorkingData.sections[sid][field] = value;
  }

  _tplUpdateQuestion(qIndex, field, value) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    const q = this._tplWorkingData.sections[sid].questions[qIndex];
    if (!q) return;
    q[field] = value;
    // If inputType changed to select/multi_select, ensure options array exists
    if (field === 'inputType' && (value === 'select' || value === 'multi_select') && !q.options) {
      q.options = [];
    }
    // Re-render if inputType changed (to show/hide options editor)
    if (field === 'inputType') {
      const editor = document.getElementById('ll-tpl-section-editor');
      if (editor) editor.innerHTML = this._renderTplSectionEditor();
    }
  }

  _tplMoveQuestion(qIndex, direction) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    const qs = this._tplWorkingData.sections[sid].questions;
    const newIndex = qIndex + direction;
    if (newIndex < 0 || newIndex >= qs.length) return;
    [qs[qIndex], qs[newIndex]] = [qs[newIndex], qs[qIndex]];
    const editor = document.getElementById('ll-tpl-section-editor');
    if (editor) editor.innerHTML = this._renderTplSectionEditor();
  }

  _tplDeleteQuestion(qIndex) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    this._tplWorkingData.sections[sid].questions.splice(qIndex, 1);
    const editor = document.getElementById('ll-tpl-section-editor');
    if (editor) editor.innerHTML = this._renderTplSectionEditor();
  }

  _tplAddQuestion() {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    const qs = this._tplWorkingData.sections[sid].questions;
    const key = 'q_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
    qs.push({
      key,
      label: 'New Question',
      inputType: 'text',
      required: false,
      pii: false,
      helpText: '',
      placeholder: '',
    });
    const editor = document.getElementById('ll-tpl-section-editor');
    if (editor) editor.innerHTML = this._renderTplSectionEditor();
  }

  _tplUpdateOption(qIndex, optIndex, field, value) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    const q = this._tplWorkingData.sections[sid].questions[qIndex];
    if (!q || !q.options || !q.options[optIndex]) return;
    q.options[optIndex][field] = value;
  }

  _tplAddOption(qIndex) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    const q = this._tplWorkingData.sections[sid].questions[qIndex];
    if (!q) return;
    if (!q.options) q.options = [];
    q.options.push({ label: '', value: '' });
    const editor = document.getElementById('ll-tpl-section-editor');
    if (editor) editor.innerHTML = this._renderTplSectionEditor();
  }

  _tplRemoveOption(qIndex, optIndex) {
    const sid = this._tplActiveSection;
    if (!sid || !this._tplWorkingData.sections[sid]) return;
    const q = this._tplWorkingData.sections[sid].questions[qIndex];
    if (!q || !q.options) return;
    q.options.splice(optIndex, 1);
    const editor = document.getElementById('ll-tpl-section-editor');
    if (editor) editor.innerHTML = this._renderTplSectionEditor();
  }

  _tplAddPhase() {
    const name = prompt('Phase name:');
    if (!name || !name.trim()) return;
    const id = name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
    if (!id) { llToast.warning('Invalid phase name.'); return; }
    if (this._tplWorkingData.phases.some(p => p.id === id)) { llToast.warning('A phase with this ID already exists.'); return; }
    this._tplWorkingData.phases.push({ id, name: name.trim() });
    this._renderTemplateDetail(document.getElementById('ll-admin-content'));
  }

  _tplRenamePhase(index, newName) {
    if (!newName.trim()) return;
    const oldId = this._tplWorkingData.phases[index].id;
    this._tplWorkingData.phases[index].name = newName.trim();
    // Don't change the ID — sections reference it
  }

  _tplMovePhase(index, direction) {
    const phases = this._tplWorkingData.phases;
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= phases.length) return;
    [phases[index], phases[newIndex]] = [phases[newIndex], phases[index]];
    this._renderTemplateDetail(document.getElementById('ll-admin-content'));
  }

  async _tplDeletePhase(index) {
    const phase = this._tplWorkingData.phases[index];
    const sectionsInPhase = Object.values(this._tplWorkingData.sections).filter(s => s.phase === phase.id);
    if (sectionsInPhase.length > 0) {
      if (!await llConfirm(`Phase "${phase.name}" has ${sectionsInPhase.length} section(s). They will be moved to the first phase. Continue?`)) return;
      const firstPhaseId = this._tplWorkingData.phases.find((p, i) => i !== index)?.id;
      sectionsInPhase.forEach(s => { s.phase = firstPhaseId; });
    }
    this._tplWorkingData.phases.splice(index, 1);
    this._renderTemplateDetail(document.getElementById('ll-admin-content'));
  }

  _tplAddSection() {
    const name = prompt('Section name:');
    if (!name || !name.trim()) return;
    const id = name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
    if (!id) { llToast.warning('Invalid section name.'); return; }
    if (this._tplWorkingData.sections[id]) { llToast.warning('A section with this ID already exists.'); return; }
    const defaultPhase = this._tplWorkingData.phases?.[0]?.id || 'discovery';
    this._tplWorkingData.sections[id] = {
      id,
      name: name.trim(),
      description: '',
      phase: defaultPhase,
      questions: [],
    };
    this._tplActiveSection = id;
    this._renderAdminTab();
  }

  async _tplDeleteSection() {
    const sid = this._tplActiveSection;
    if (!sid) return;
    if (!await llConfirm(`Delete section "${this._tplWorkingData.sections[sid]?.name || sid}"? This cannot be undone.`)) return;
    delete this._tplWorkingData.sections[sid];
    this._tplActiveSection = null;
    this._renderAdminTab();
  }

  async _tplSave() {
    const name = document.getElementById('ll-tpl-name')?.value?.trim();
    const desc = document.getElementById('ll-tpl-desc')?.value?.trim() || '';
    if (!name) { llToast.warning('Template name is required.'); return; }
    this._tplName = name;
    this._tplDesc = desc;
    try {
      await window.llClient.saveTemplate(this._tplEditing, name, desc, this._tplWorkingData);
      llToast.success('Template saved successfully.');
    } catch (err) {
      console.error('Save template error:', err);
      llToast.error('Failed to save template: ' + err.message);
    }
  }

  _hideHelp() {

    if (!overlay || !panel) return;

    panel.classList.add('ll-help-closing');
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.25s ease';

    setTimeout(() => {
      overlay.remove();
      panel.remove();
    }, 250);
  }

  _toggleHelpSection(header) {
    const body = header.nextElementSibling;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    header.classList.toggle('open', !isOpen);
  }

      return `

        <label class="ll-label">Your Suggestion</label>
        <textarea class="ll-textarea" id="ll-fb-message" placeholder="I'd like to see..." style="margin-bottom:0.75rem;"></textarea>
        <label class="ll-label">Why is this important to you?</label>

        <button class="ll-btn ll-btn-primary" style="width:100%;" onclick="llApp._submitFeedback('suggestion')">Submit Suggestion</button>
      `;
    }
    if (type === 'review') {
      return `
        <p class="ll-subtitle" style="margin-bottom:1rem;">How would you rate your experience?</p>
        <div class="ll-stars" id="ll-fb-stars">
          ${[1,2,3,4,5].map(n => `<button class="ll-star" data-rating="${n}" onclick="llApp._setRating(${n})">&#9733;</button>`).join('')}
        </div>
        <input type="hidden" id="ll-fb-rating" value="0" />
        <label class="ll-label">What do you enjoy most?</label>
        <textarea class="ll-textarea" id="ll-fb-message" placeholder="I really enjoy..." style="margin-bottom:1.25rem;"></textarea>
        <button class="ll-btn ll-btn-primary" style="width:100%;" onclick="llApp._submitFeedback('review')">Submit Review</button>
      `;
    }
    return `
      <p class="ll-subtitle" style="margin-bottom:1rem;">Help us fix issues by describing what happened.</p>
      <label class="ll-label">What happened?</label>
      <textarea class="ll-textarea" id="ll-fb-message" placeholder="When I clicked on..." style="margin-bottom:0.75rem;"></textarea>
      <label class="ll-label">What did you expect to happen?</label>
      <textarea class="ll-textarea" id="ll-fb-detail" placeholder="I expected..." style="margin-bottom:1.25rem;"></textarea>
      <button class="ll-btn ll-btn-primary" style="width:100%;" onclick="llApp._submitFeedback('bug')">Submit Bug Report</button>
    `;

  _setRating(n) {
    document.getElementById('ll-fb-rating').value = n;
    document.querySelectorAll('.ll-star').forEach(s => {
      s.classList.toggle('filled', parseInt(s.dataset.rating) <= n);
    });
  }

  async _submitFeedback(type) {
    const message = document.getElementById('ll-fb-message')?.value?.trim();
    if (!message) { llToast.warning('Please enter a message.'); return; }
    const detail = document.getElementById('ll-fb-detail')?.value?.trim() || null;
    const rating = type === 'review' ? parseInt(document.getElementById('ll-fb-rating')?.value || '0') : null;
    if (type === 'review' && (!rating || rating < 1)) { llToast.warning('Please select a star rating.'); return; }
    const btn = document.querySelector('#ll-feedback-body .ll-btn-primary');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      const { error } = await window.llClient.supabase.from('feedback').insert({
        user_id: window.llClient.user?.id, type, rating, message, detail,
      });
      if (error) throw error;
      llToast.success('Thank you for your feedback!');
      document.getElementById('ll-feedback-overlay')?.remove();
    } catch (err) {
      console.error('Feedback error:', err);
      llToast.error('Failed to send feedback.');
      btn.disabled = false;
      btn.textContent = type === 'suggestion' ? 'Submit Suggestion' : type === 'review' ? 'Submit Review' : 'Submit Bug Report';
    }
  }

  async _loadImportData(projectId) {
    try {
      const uploads = await window.llClient.getClientUploads(projectId);
      this._importUploads = uploads;
      this._renderImportFiles();

      const suggestions = await window.llClient.getSuggestedResponses(projectId);
      this._importSuggestions = suggestions;
      if (suggestions.length > 0) {
        this._renderSuggestions();
      }
    } catch (err) {
      console.error('Load import data error:', err);
    }
  }

  async _handleImportFiles(fileList) {
    const allowed = ['.pdf', '.xlsx', '.csv', '.docx', '.txt'];
    const projectId = this._importProjectId;

    for (const file of fileList) {
      const ext = '.' + file.name.split('.').pop().toLowerCase();
      if (!allowed.includes(ext)) {
        llToast.warning(`Skipped ${file.name} — unsupported file type.`);
        continue;
      }

      try {
        const uploaded = await window.llClient.uploadClientFile(projectId, file);
        this._importUploads = this._importUploads || [];
        this._importUploads.unshift({ ...uploaded, file_size: file.size, mime_type: file.type });
        this._renderImportFiles();
        llToast.success(`Uploaded ${file.name}`);
      } catch (err) {
        console.error('Upload error:', err);
        llToast.error(`Failed to upload ${file.name}`);
      }
    }
  }

  _renderImportFiles() {
    const container = document.getElementById('ll-import-file-list');
    if (!container) return;
    const uploads = this._importUploads || [];
    if (uploads.length === 0) {
      container.innerHTML = '<p class="ll-text-sm ll-text-muted">No files uploaded yet.</p>';
      return;
    }

    const statusBadge = (s) => {
      const map = { uploaded: 'blue', processing: 'yellow', completed: 'green', failed: 'red' };
      return `<span class="ll-badge ll-badge-${map[s] || 'gray'}">${s}</span>`;
    };

    const formatSize = (bytes) => {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    };

    container.innerHTML = uploads.map(u => `
      <div class="ll-upload-item" data-upload-id="${u.id}">
        <div>
          <span class="ll-text-sm" style="font-weight:500;">${this._esc(u.file_name)}</span>
          <span class="ll-text-xs ll-text-muted" style="margin-left:0.5rem;">${formatSize(u.file_size)}</span>
        </div>
        <div class="ll-flex ll-gap-2 ll-items-center">
          ${statusBadge(u.status || 'uploaded')}
          ${(u.status === 'completed' || u.status === 'failed') ? `<button class="ll-btn ll-btn-secondary ll-btn-sm" style="padding:0.25rem 0.5rem;" onclick="llApp._showExtractedText('${u.id}')" title="View Extracted Text">View Text</button>` : ''}
          <button class="ll-btn ll-btn-secondary ll-btn-sm" style="color:var(--ll-error); padding:0.25rem 0.5rem;" onclick="llApp._deleteImportFile('${u.id}', '${u.storage_path}')" title="Delete">&times;</button>
        </div>
      </div>
    `).join('');
  }

  async _deleteImportFile(uploadId, storagePath) {
    const ok = await llConfirm('Delete this file? This cannot be undone.');
    if (!ok) return;
    try {
      await window.llClient.deleteClientUpload(uploadId, storagePath);
      this._importUploads = (this._importUploads || []).filter(u => u.id !== uploadId);
      this._renderImportFiles();
      llToast.success('File deleted.');
    } catch (err) {
      console.error('Delete error:', err);
      llToast.error('Failed to delete file.');
    }
  }

  async _showExtractedText(uploadId) {
    try {
      const { data, error } = await window.llClient.supabase
        .from('client_uploads')
        .select('file_name, extracted_text, extraction_result')
        .eq('id', uploadId)
        .single();
      if (error) throw error;

      const fileName = this._esc(data.file_name || 'Unknown file');
      const text = data.extracted_text || '(No extracted text available)';
      const result = data.extraction_result || {};
      const suggestionsCount = result.suggestions_count ?? result.suggestionsCount ?? 'N/A';
      const textLength = text.length;

      const overlay = document.createElement('div');
      overlay.className = 'll-modal-overlay';
      overlay.id = 'll-extracted-text-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="ll-modal" style="max-width:700px; width:95%;">
          <div class="ll-flex ll-justify-between ll-items-center" style="margin-bottom:1rem;">
            <h3 class="ll-h2" style="margin:0;">Extracted Text: ${fileName}</h3>
            <button class="ll-btn ll-btn-secondary ll-btn-sm" onclick="document.getElementById('ll-extracted-text-overlay').remove()">Close</button>
          </div>
          <div class="ll-flex ll-gap-4" style="margin-bottom:1rem;">
            <span class="ll-badge ll-badge-blue">Suggestions: ${suggestionsCount}</span>
            <span class="ll-badge ll-badge-gray">Text length: ${textLength.toLocaleString()} chars</span>
          </div>
          <pre style="background:var(--ll-surface-low); padding:1rem; border-radius:var(--ll-radius-sm); font-size:0.8125rem; white-space:pre-wrap; word-wrap:break-word; max-height:50vh; overflow-y:auto; font-family:'Courier New',Courier,monospace;">${this._esc(text)}</pre>
        </div>
      `;
      document.body.appendChild(overlay);
    } catch (err) {
      console.error('Show extracted text error:', err);
      llToast.error('Failed to load extracted text.');
    }
  }

  async _analyzeImportFiles() {
    const projectId = this._importProjectId;
    const uploads = (this._importUploads || []).filter(u => u.status === 'uploaded' || !u.status);

    if (uploads.length === 0) {
      llToast.warning('No new files to analyze.');
      return;
    }

    const btn = document.getElementById('ll-import-analyze-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Analyzing...'; }

    let triggered = 0;
    for (const u of uploads) {
      try {
        await window.llClient.triggerExtraction(projectId, u.id);
        u.status = 'processing';
        triggered++;
      } catch (err) {
        console.error('Extraction trigger error:', err);
        u.status = 'failed';
        llToast.error(`Failed to analyze ${u.file_name}`);
      }
    }
    this._renderImportFiles();

    if (triggered > 0) {
      llToast.info(`Analyzing ${triggered} file(s)...`);
      this._pollImportStatus(projectId);
    }

    if (btn) { btn.disabled = false; btn.textContent = 'Analyze Files'; }
  }

  async _pollImportStatus(projectId) {
    const poll = async () => {
      try {
        const uploads = await window.llClient.getClientUploads(projectId);
        this._importUploads = uploads;
        this._renderImportFiles();

        const processing = uploads.filter(u => u.status === 'processing');
        if (processing.length > 0) {
          setTimeout(poll, 3000);
        } else {
          // All done, load suggestions
          const suggestions = await window.llClient.getSuggestedResponses(projectId);
          this._importSuggestions = suggestions;
          this._renderSuggestions();
          if (suggestions.length > 0) {
            llToast.success(`Analysis complete! ${suggestions.length} suggestion(s) found.`);
          } else {
            llToast.info('Analysis complete. No suggestions generated.');
          }
        }
      } catch (err) {
        console.error('Poll error:', err);
      }
    };
    setTimeout(poll, 3000);
  }

  _renderSuggestions(filter) {
    filter = filter || 'all';
    const container = document.getElementById('ll-import-suggestions');
    const filtersEl = document.getElementById('ll-import-suggestion-filters');
    if (!container) return;

    const suggestions = this._importSuggestions || [];
    if (suggestions.length === 0) {
      container.innerHTML = '<p class="ll-text-sm ll-text-muted">Upload and analyze files to see suggestions.</p>';
      if (filtersEl) filtersEl.style.display = 'none';
      return;
    }

    if (filtersEl) filtersEl.style.display = 'block';

    // Update counts
    const counts = { all: suggestions.length, high: 0, medium: 0, low: 0 };
    suggestions.forEach(s => { if (counts[s.confidence] !== undefined) counts[s.confidence]++; });
    ['all', 'high', 'medium', 'low'].forEach(k => {
      const el = document.getElementById(`ll-sug-count-${k}`);
      if (el) el.textContent = `(${counts[k]})`;
    });

    // Update active filter button
    document.querySelectorAll('.ll-import-filter').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });

    const filtered = filter === 'all' ? suggestions : suggestions.filter(s => s.confidence === filter);

    if (filtered.length === 0) {
      container.innerHTML = '<p class="ll-text-sm ll-text-muted">No suggestions match this filter.</p>';
      return;
    }

    const confidenceBadge = (c) => {
      const cls = c === 'high' ? 'll-confidence-high' : c === 'medium' ? 'll-confidence-medium' : 'll-confidence-low';
      const bg = c === 'high' ? 'rgba(13,148,136,0.1)' : c === 'medium' ? 'rgba(245,158,11,0.1)' : 'rgba(220,38,38,0.1)';
      return `<span class="ll-badge ${cls}" style="background:${bg};">${c}</span>`;
    };

    const formatValue = (v) => {
      if (v === null || v === undefined) return '';
      if (typeof v === 'object') return JSON.stringify(v);
      return String(v);
    };

    container.innerHTML = filtered.map(s => {
      const accepted = s.status === 'accepted';
      const rejected = s.status === 'rejected';
      return `
        <div class="ll-suggestion-card ${accepted ? 'accepted' : ''}" data-suggestion-id="${s.id}">
          <div class="ll-flex ll-justify-between ll-items-center" style="margin-bottom:0.375rem;">
            <div>
              <span class="ll-text-xs ll-text-muted">${this._esc(s.section_id)}</span>
              <span class="ll-text-sm" style="font-weight:600; margin-left:0.25rem;">${this._esc(s.question_key)}</span>
            </div>
            ${confidenceBadge(s.confidence)}
          </div>
          <div class="ll-text-sm" style="margin-bottom:0.375rem; font-weight:500;">${this._esc(formatValue(s.suggested_value))}</div>
          ${s.source_excerpt ? `<div class="ll-text-xs ll-text-muted" style="margin-bottom:0.5rem; font-style:italic;">"${this._esc(s.source_excerpt)}"</div>` : ''}
          <div class="ll-flex ll-gap-2">
            ${accepted ? '<span class="ll-badge ll-badge-green">Accepted</span>' :
              rejected ? '<span class="ll-badge ll-badge-red">Rejected</span>' : `
              <button class="ll-btn ll-btn-primary ll-btn-sm" onclick="llApp._acceptImportSuggestion('${s.id}')">Accept</button>
              <button class="ll-btn ll-btn-secondary ll-btn-sm" onclick="llApp._rejectImportSuggestion('${s.id}')">Reject</button>
            `}
          </div>
        </div>
      `;
    }).join('');
  }

  _filterSuggestions(filter) {
    this._renderSuggestions(filter);
  }

  async _acceptImportSuggestion(suggestionId) {
    const projectId = this._importProjectId;
    const suggestion = (this._importSuggestions || []).find(s => s.id === suggestionId);
    if (!suggestion) return;
    try {
      await window.llClient.acceptSuggestion({ ...suggestion, project_id: projectId });
      suggestion.status = 'accepted';
      this._renderSuggestions();
      llToast.success('Suggestion accepted.');
    } catch (err) {
      console.error('Accept error:', err);
      llToast.error('Failed to accept suggestion.');
    }
  }

  async _rejectImportSuggestion(suggestionId) {
    const suggestion = (this._importSuggestions || []).find(s => s.id === suggestionId);
    if (!suggestion) return;
    try {
      await window.llClient.rejectSuggestion(suggestionId);
      suggestion.status = 'rejected';
      this._renderSuggestions();
      llToast.info('Suggestion rejected.');
    } catch (err) {
      console.error('Reject error:', err);
      llToast.error('Failed to reject suggestion.');
    }
  }

  async _acceptAllHighConfidence() {
    const projectId = this._importProjectId;
    const ok = await llConfirm('Accept all high-confidence suggestions? This will save them as responses.');
    if (!ok) return;
    try {
      const count = await window.llClient.acceptAllHighConfidence(projectId);
      // Refresh local state
      const suggestions = await window.llClient.getSuggestedResponses(projectId);
      this._importSuggestions = suggestions;
      this._renderSuggestions();
      llToast.success(`Accepted ${count} high-confidence suggestion(s).`);
    } catch (err) {
      console.error('Accept all error:', err);
      llToast.error('Failed to accept suggestions.');
    }
  }

  _esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
}

// Boot
document.addEventListener('DOMContentLoaded', () => {
  window.llApp = new LLApp('ll-app');
  window.llApp.init();
});
  </script>
</body>
