            <p><strong>Phases</strong> &mdash; Projects progress through 3 phases with <strong>42 total sections</strong>:</p>
            <ul>
              <li><strong>Discovery</strong> (12 sections): Core program setup &mdash; tenancy, program details, loyalty accounts, policies, sponsors, member enrollment, tiers, earning/redemption rules, offers, data migration, and marketing.</li>
              <li><strong>Solution Design</strong> (19 sections): Detailed data models, entity configurations, member services, batch processing, role management, and integrations.</li>
              <li><strong>Launch Readiness</strong> (11 sections): Industry-specific modules (Airlines, Hospitality), AI features (AiSense, AiRecommend, AiRetain, AiTrust), and specialized configurations.</li>
            </ul>

            <p><strong>Sections</strong> &mdash; Each section covers a specific topic. Sections have statuses:</p>
            <ul>
              <li><strong>Not Started</strong> &mdash; No responses yet.</li>
              <li><strong>In Progress</strong> &mdash; Some responses saved (auto-saved on blur).</li>
              <li><strong>In Review</strong> &mdash; Submitted by the user for LJI review.</li>
              <li><strong>Approved</strong> &mdash; Reviewed and approved by an LJI admin.</li>
              <li><strong>Skipped</strong> &mdash; Not applicable for this project.</li>
            </ul>

            <p><strong>Auto-save</strong> &mdash; All form inputs save automatically when you leave the field (on blur), not on every keystroke. A <strong>"Saved"</strong> indicator appears briefly in the bottom-right corner to confirm each save.</p>

            <p><strong>Conditional Visibility</strong> &mdash; Both individual questions and entire sections can appear or disappear based on your answers. For example, tier management questions only show if you indicate your program has tiers, and industry-specific sections are hidden unless the relevant industry is selected.</p>

            <p><strong>Survey Template Customization</strong> &mdash; LJI Admins can customize the survey templates via the Admin Panel &mdash; toggling questions as required or optional and setting default values. These customizations apply to all new form loads.</p>

            <p><strong>Phase Advancement</strong> &mdash; Once all sections in a phase are approved (or skipped), an LJI admin can advance the project to the next phase, unlocking new sections.</p>
          </div>
        </div>

        <!-- Roles & Permissions -->
        <div class="ll-help-section">
          <button class="ll-help-section-header" onclick="llApp._toggleHelpSection(this)">
            Roles &amp; Permissions <span class="ll-help-chevron">&#9660;</span>
          </button>
          <div class="ll-help-section-body">
            <table class="ll-help-table">
              <thead>
                <tr>
                  <th>Permission</th>
                  <th>LJI Admin</th>
                  <th>LJI Member</th>
                  <th>Client Admin</th>
                  <th>Client Member</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>View assigned projects</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td></tr>
                <tr><td>Fill in questionnaire</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td></tr>
                <tr><td>Submit sections for review</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td></tr>
                <tr><td>Create projects</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td></tr>
                <tr><td>Manage project members</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-check">${Y}*</td><td class="ll-cross">${N}</td></tr>
                <tr><td>Approve/reject sections</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td></tr>
                <tr><td>Delete projects</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td></tr>
                <tr><td>Advance project phases</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td></tr>
                <tr><td>Customize survey templates</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td></tr>
                <tr><td>Access admin panel</td><td class="ll-check">${Y}</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td></tr>
                <tr><td>Manage user roles</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td><td class="ll-cross">${N}</td></tr>
                <tr><td>View PII-encrypted data</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td><td class="ll-check">${Y}</td><td class="ll-cross">${N}</td></tr>
              </tbody>
            </table>
            <p style="font-size:0.75rem; margin-top:0.25rem;">* Client Admins can manage members for their own project only.</p>

            <ul>
              <li><strong>LJI Admin</strong> &mdash; Full control. Can create projects, manage users, approve sections, advance phases, edit survey templates, and access the admin panel. This is for LJI's project leads and senior staff.</li>
              <li><strong>LJI Member</strong> &mdash; Can view and fill in questionnaires for assigned projects. Cannot approve, create projects, or access admin features. For LJI team members supporting the onboarding.</li>
              <li><strong>Client Admin</strong> &mdash; The primary client contact. Can fill in questionnaires and invite other client team members. Cannot approve sections or access LJI admin features.</li>
              <li><strong>Client Member</strong> &mdash; Can fill in questionnaire responses for assigned projects. Most restricted role &mdash; for client team members who contribute to specific sections.</li>
            </ul>
          </div>
        </div>

        <!-- Data Security -->
        <div class="ll-help-section">
          <button class="ll-help-section-header" onclick="llApp._toggleHelpSection(this)">
            Data Security <span class="ll-help-chevron">&#9660;</span>
          </button>
          <div class="ll-help-section-body">
            <ul>
              <li>All data is stored in Supabase PostgreSQL with Row Level Security (RLS).</li>
              <li>The Supabase project is hosted in the EU (<strong>eu-west-1</strong>).</li>
              <li>All communication between the browser and the server is over <strong>HTTPS</strong>.</li>
              <li>PII (Personally Identifiable Information) fields are flagged and stored with column-level encryption using pgcrypto AES.</li>
              <li>Only LJI Admins and Client Admins can view PII data.</li>
              <li>Client Members can enter PII data but cannot read it back (write-only access).</li>
              <li>Each project is isolated &mdash; users can only see projects they are members of.</li>
              <li>File uploads are stored in secure Supabase Storage with project-scoped access.</li>
              <li>A <strong>5-minute client-side cache</strong> is used for performance, reducing redundant network requests.</li>
            </ul>
          </div>
        </div>

        <!-- Glossary -->
        <div class="ll-help-section">
          <button class="ll-help-section-header" onclick="llApp._toggleHelpSection(this)">
            Glossary <span class="ll-help-chevron">&#9660;</span>
          </button>
          <div class="ll-help-section-body">
            <p>GRAVTY-specific terms have <span style="border-bottom:1px dashed var(--ll-on-surface-variant);">dotted-underline tooltips</span> throughout the questionnaire.</p>
            <p>Hover over any underlined term to see its definition.</p>
            <p>The glossary covers terms like <strong>BIT</strong> (Business Intelligence Transaction), <strong>Sponsor</strong>, <strong>Tier</strong>, <strong>Loyalty Account</strong>, <strong>Lookup Codes</strong>, <strong>Privileges</strong>, <strong>Offers</strong>, and more.</p>
          </div>
        </div>

        <!-- Admin Panel -->
        <div class="ll-help-section">
          <button class="ll-help-section-header" onclick="llApp._toggleHelpSection(this)">
            Admin Panel (LJI Admins only) <span class="ll-help-chevron">&#9660;</span>
          </button>
          <div class="ll-help-section-body">
            <ul>
              <li><strong>Users tab</strong> &mdash; View all registered users and change their roles.</li>
              <li><strong>Projects tab</strong> &mdash; View all projects across all clients, create new projects, and delete existing ones.</li>
              <li><strong>Survey Templates tab</strong> &mdash; Expand each section to see its questions. Toggle individual questions as required or optional, set default values for any field, and save changes per section. Customizations apply to all new form loads.</li>
            </ul>
          </div>
        </div>

        <!-- Manage Members -->
        <div class="ll-help-section">
          <button class="ll-help-section-header" onclick="llApp._toggleHelpSection(this)">
            Manage Members <span class="ll-help-chevron">&#9660;</span>
          </button>
          <div class="ll-help-section-body">
            <ul>
              <li>LJI Admins see a <strong>"Manage Members"</strong> button on each project card on the dashboard.</li>
              <li>From the Manage Members dialog, you can add any registered user to the project and assign them a specific role (LJI Member, Client Admin, or Client Member).</li>
              <li>You can also remove existing members from the project.</li>
              <li>Users can only see projects they are members of &mdash; adding a member grants them access, and removing one revokes it.</li>
              <li>Client Admins can manage members for their own project only.</li>
            </ul>
          </div>
        </div>

        <!-- Tips -->
        <div class="ll-help-section">
          <button class="ll-help-section-header" onclick="llApp._toggleHelpSection(this)">
            Tips <span class="ll-help-chevron">&#9660;</span>
          </button>
          <div class="ll-help-section-body">
            <ul>
              <li>Click the <strong>LJI logo</strong> in the top-left to return to the dashboard from any page.</li>
              <li>Use the <strong>"?"</strong> button on any page to open this help panel.</li>
              <li>Use the keyboard <strong>Tab</strong> key to move between fields quickly.</li>
              <li>Required fields are marked with a red asterisk (<span style="color:var(--ll-error); font-weight:700;">*</span>).</li>
              <li>Help text appears below each question label in gray.</li>
              <li>The progress bar on the dashboard shows overall completion percentage.</li>
              <li>If you see stale data, try a hard-refresh with <strong>Ctrl+Shift+R</strong> (or Cmd+Shift+R on Mac).</li>
            </ul>
          </div>
        </div>

      </div>
    `;

    document.body.appendChild(overlay);
    document.body.appendChild(panel);
  }

  _hideHelp() {
    const overlay = document.getElementById('ll-help-overlay');
    const panel = document.getElementById('ll-help-panel');
    if (!overlay || !panel) return;

    panel.classList.add('ll-help-closing');
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.25s ease';

    setTimeout(() => {
      overlay.remove();
      panel.remove();
    }, 250);
  }

  _toggleHelpSection(header) {
    const body = header.nextElementSibling;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    header.classList.toggle('open', !isOpen);
  }

  // --- Feedback ---
  _showFeedback() {
    if (document.getElementById('ll-feedback-overlay')) return;
    const overlay = document.createElement('div');
    overlay.id = 'll-feedback-overlay';
    overlay.className = 'll-confirm-overlay';
    overlay.innerHTML = `
      <div class="ll-confirm-box" style="max-width:480px;">
        <div class="ll-flex ll-justify-between ll-items-center" style="margin-bottom:1rem;">
          <h3 class="ll-h2" style="margin:0;">Send Feedback</h3>
          <button class="ll-btn ll-btn-secondary ll-btn-sm" onclick="document.getElementById('ll-feedback-overlay').remove()">Close</button>
        </div>
        <div class="ll-feedback-tabs">
          <button class="ll-feedback-tab active" onclick="llApp._switchFeedbackTab('suggestion', this)">Suggestion</button>
          <button class="ll-feedback-tab" onclick="llApp._switchFeedbackTab('review', this)">Review</button>
          <button class="ll-feedback-tab" onclick="llApp._switchFeedbackTab('bug', this)">Bug Report</button>
        </div>
        <div id="ll-feedback-body">${this._feedbackForm('suggestion')}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  }

  _switchFeedbackTab(type, btn) {
    document.querySelectorAll('.ll-feedback-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('ll-feedback-body').innerHTML = this._feedbackForm(type);
  }

  _feedbackForm(type) {
    if (type === 'suggestion') {
      return `
        <p class="ll-subtitle" style="margin-bottom:1rem;">What would you like to see in LoyaltyLift and why?</p>
        <label class="ll-label">Your Suggestion</label>
        <textarea class="ll-textarea" id="ll-fb-message" placeholder="I'd like to see..." style="margin-bottom:0.75rem;"></textarea>
        <label class="ll-label">Why is this important to you?</label>
        <textarea class="ll-textarea" id="ll-fb-detail" placeholder="This would help because..." style="margin-bottom:1.25rem;"></textarea>
        <button class="ll-btn ll-btn-primary" style="width:100%;" onclick="llApp._submitFeedback('suggestion')">Submit Suggestion</button>
      `;
    }
    if (type === 'review') {
      return `
        <p class="ll-subtitle" style="margin-bottom:1rem;">How would you rate your experience?</p>
        <div class="ll-stars" id="ll-fb-stars">
          ${[1,2,3,4,5].map(n => `<button class="ll-star" data-rating="${n}" onclick="llApp._setRating(${n})">&#9733;</button>`).join('')}
        </div>
        <input type="hidden" id="ll-fb-rating" value="0" />
        <label class="ll-label">What do you enjoy most?</label>
        <textarea class="ll-textarea" id="ll-fb-message" placeholder="I really enjoy..." style="margin-bottom:1.25rem;"></textarea>
        <button class="ll-btn ll-btn-primary" style="width:100%;" onclick="llApp._submitFeedback('review')">Submit Review</button>
      `;
    }
    return `
      <p class="ll-subtitle" style="margin-bottom:1rem;">Help us fix issues by describing what happened.</p>
      <label class="ll-label">What happened?</label>
      <textarea class="ll-textarea" id="ll-fb-message" placeholder="When I clicked on..." style="margin-bottom:0.75rem;"></textarea>
      <label class="ll-label">What did you expect to happen?</label>
      <textarea class="ll-textarea" id="ll-fb-detail" placeholder="I expected..." style="margin-bottom:1.25rem;"></textarea>
      <button class="ll-btn ll-btn-primary" style="width:100%;" onclick="llApp._submitFeedback('bug')">Submit Bug Report</button>
    `;
  }

  _setRating(n) {
    document.getElementById('ll-fb-rating').value = n;
    document.querySelectorAll('.ll-star').forEach(s => {
      s.classList.toggle('filled', parseInt(s.dataset.rating) <= n);
    });
  }

  async _submitFeedback(type) {
    const message = document.getElementById('ll-fb-message')?.value?.trim();
    if (!message) { llToast.warning('Please enter a message.'); return; }
    const detail = document.getElementById('ll-fb-detail')?.value?.trim() || null;
    const rating = type === 'review' ? parseInt(document.getElementById('ll-fb-rating')?.value || '0') : null;
    if (type === 'review' && (!rating || rating < 1)) { llToast.warning('Please select a star rating.'); return; }
    const btn = document.querySelector('#ll-feedback-body .ll-btn-primary');
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      const { error } = await window.llClient.supabase.from('feedback').insert({
        user_id: window.llClient.user?.id, type, rating, message, detail,
      });
      if (error) throw error;
      llToast.success('Thank you for your feedback!');
      document.getElementById('ll-feedback-overlay')?.remove();
    } catch (err) {
      console.error('Feedback error:', err);
      llToast.error('Failed to send feedback.');
      btn.disabled = false;
      btn.textContent = type === 'suggestion' ? 'Submit Suggestion' : type === 'review' ? 'Submit Review' : 'Submit Bug Report';
    }
  }

  _esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
}

// Boot
document.addEventListener('DOMContentLoaded', () => {
  window.llApp = new LLApp('ll-app');
  window.llApp.init();
});
  </script>
</body>
